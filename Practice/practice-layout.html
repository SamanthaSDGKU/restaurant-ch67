<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice: Flexbox</title>
    <style>
        .flex-sample {
            display: flex;
            height: 600px;
            background-color: #dedede;
            /* flex-direction help us to change the direction of the elements 
            between: row (default) and column.  */
            flex-direction:row;
            /* When flex-direction:row, justify-content help us to organize
            elements horizontally and if flex-direction:column, it organize elements
            vertically. */ 
            justify-content: space-evenly;
            /* When flex-direction:row, align-items help us to organize
            elements vertically and if flex-direction:column, it organize elements
            horizontally. */ 
            align-items:center;
        }
        .children {
            padding: 30px;
            margin: 10px;
            text-align: center;
            background-color: rgb(1,113,123);
        }
        .grid-sample {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .item{
            background-color: gray;
            padding: 20px;
            margin: 3px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- flex practice -->
     <section class="flex-sample"> <!-- parent element -->
            <div class="children">A</div> <!-- child element -->
            <div class="children">B</div> <!-- child element -->
            <div class="children">C</div> <!-- child element -->
            <div class="children">C</div> <!-- child element -->
            <div class="children">C</div> <!-- child element -->
            <div class="children">C</div> <!-- child element -->
            <div class="children">C</div> <!-- child element -->
            <div class="children">C</div> <!-- child element -->
     </section>

     <!-- grid practice -->
      <section class="grid-sample">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
      </section>
</body>
</html>
